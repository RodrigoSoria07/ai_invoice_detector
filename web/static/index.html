<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invoice Extractor</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧾</text></svg>"
    />
    <!-- All assets served locally — no CDN, no in-browser compile, works fully offline. -->
    <script src="/vendor/react.production.min.js"></script>
    <script src="/vendor/react-dom.production.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f8fafc;
        color: #1e293b;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(90deg, #4f46e5, #3b82f6);
        color: #fff;
      }
      .header-inner { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
      .header h1 { margin: 0; font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
      .header p { margin: 8px 0 0; color: #e0e7ff; }
      .header p .accent { color: #fff; font-weight: 500; }
      .container { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
      .stack > * + * { margin-top: 20px; }

      .dropzone {
        border: 2px dashed #cbd5e1; border-radius: 18px; background: #fff;
        padding: 48px 24px; text-align: center; cursor: pointer;
        transition: border-color .15s, background .15s;
      }
      .dropzone:hover { border-color: #818cf8; background: #f8fafc; }
      .dropzone.dragging { border-color: #4f46e5; background: #eef2ff; }
      .dropzone .icon { font-size: 46px; margin-bottom: 12px; }
      .dropzone .title { font-size: 18px; font-weight: 500; color: #334155; }
      .dropzone .hint { font-size: 14px; color: #64748b; margin-top: 4px; }

      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 18px;
        box-shadow: 0 1px 3px rgba(15,23,42,.06); }
      .card.pad { padding: 32px; }
      .card.center { text-align: center; }

      .spinner { width: 40px; height: 40px; margin: 0 auto; border-radius: 50%;
        border: 4px solid #c7d2fe; border-top-color: #4f46e5; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .row.between { justify-content: space-between; }
      .muted { color: #64748b; font-size: 14px; }
      .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 16rem; }

      .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px;
        font-size: 12px; font-weight: 500; padding: 4px 12px; }
      .badge.ok { background: #ecfdf5; color: #047857; }
      .badge.err { background: #fef2f2; color: #dc2626; }

      .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      @media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
      .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px 16px;
        box-shadow: 0 1px 2px rgba(15,23,42,.04); }
      .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; }
      .stat .value { margin-top: 4px; font-size: 18px; font-weight: 600; color: #1e293b; word-break: break-word; }

      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      thead th { background: #f8fafc; color: #64748b; font-weight: 500; text-align: left; padding: 12px 16px; }
      thead th.r, tbody td.r, tfoot td.r { text-align: right; }
      tbody td { padding: 12px 16px; border-top: 1px solid #f1f5f9; }
      tbody tr:hover { background: #f8fafc; }
      .num { font-variant-numeric: tabular-nums; }
      tfoot td { padding: 12px 16px; background: #f8fafc; font-weight: 600; border-top: 1px solid #e2e8f0; }
      .table-card { overflow: hidden; }
      .table-wrap { overflow-x: auto; }

      .btn { border: 0; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 500;
        cursor: pointer; transition: background .15s, color .15s; }
      .btn-primary { background: #4f46e5; color: #fff; }
      .btn-primary:hover { background: #4338ca; }
      .btn-secondary { background: #fff; border: 1px solid #cbd5e1; color: #334155; }
      .btn-secondary:hover { background: #f8fafc; }
      .btn-ghost { background: transparent; color: #475569; }
      .btn-ghost:hover { color: #0f172a; }
      .btn-dark { background: #1e293b; color: #fff; }
      .btn-dark:hover { background: #334155; }
      .link { background: none; border: 0; color: #4f46e5; font-weight: 500; font-size: 14px; cursor: pointer; }
      .link:hover { color: #3730a3; }

      .error-card { background: #fff; border: 1px solid #fecaca; border-radius: 18px; padding: 28px; }
      .error-card .etitle { font-weight: 600; color: #b91c1c; margin: 0; }
      .error-card .emsg { font-size: 14px; color: #475569; margin: 6px 0 0; font-family: ui-monospace, monospace; word-break: break-word; }

      pre.json { background: #0f172a; color: #e2e8f0; font-size: 12px; padding: 20px; border-radius: 16px;
        overflow-x: auto; line-height: 1.5; }
      .foot { text-align: center; font-size: 12px; color: #94a3b8; padding-top: 16px; }
      .fade-in { animation: fade .35s ease both; }
      @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="/app.js"></script>
  </body>
</html>
